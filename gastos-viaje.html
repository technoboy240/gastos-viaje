<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gastos del Viaje 🇧🇷</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f4ee; --card: #ffffff; --accent: #e8521a; --accent2: #1a7ae8;
    --text: #1a1a1a; --muted: #888; --border: #e0dbd0; --success: #1a7a3a; --ars: #6b3fa0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 0 0 60px; }
  header { background: var(--text); color: white; padding: 28px 24px 20px; display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; }
  header h1 { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; letter-spacing: -0.5px; line-height: 1.1; }
  .container { max-width: 680px; margin: 0 auto; padding: 24px 16px; }
  .card { background: var(--card); border-radius: 16px; border: 1.5px solid var(--border); padding: 20px; margin-bottom: 18px; }
  .card-title { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 14px; }
  .sync-bar { display: flex; align-items: center; gap: 8px; padding: 10px 16px; background: #111; color: white; font-size: 12px; font-family: 'Syne', sans-serif; letter-spacing: 0.5px; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #555; flex-shrink: 0; }
  .sync-dot.ok { background: #4cff91; }
  .sync-dot.err { background: #ff6b6b; }
  .sync-dot.loading { background: #ffc84c; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  
  /* Inputs y Forms */
  .name-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .name-inputs input { width: 100%; padding: 8px 12px; border: 1.5px solid var(--border); border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); background: var(--bg); outline: none; }
  .inv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .inv-block label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 4px; }
  .inv-block input { width: 100%; font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; border: none; border-bottom: 2px solid var(--border); background: transparent; padding: 4px 0; outline: none; }
  
  .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr 2fr; gap: 10px; align-items: end; margin-bottom: 10px; }
  .form-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; align-items: end; margin-bottom: 10px; }
  .form-row input, .form-row select, .form-row2 input, .form-row2 select { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 15px; background: var(--bg); outline: none; }
  
  /* Toggles */
  .tipo-toggle { display: flex; border: 1.5px solid var(--border); border-radius: 10px; overflow: hidden; }
  .tipo-btn { flex: 1; padding: 10px 8px; border: none; background: var(--bg); color: var(--muted); font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; }
  .tipo-btn.active-comp { background: var(--accent2); color: white; }
  .tipo-btn.active-indiv { background: var(--ars); color: white; }
  
  .btn-add { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 10px; font-family: 'Syne', sans-serif; font-weight: 700; cursor: pointer; margin-top: 6px; }
  
  /* Tabla */
  .expense-table { width: 100%; border-collapse: collapse; }
  .expense-table th { font-family: 'Syne', sans-serif; font-size: 11px; color: var(--muted); padding: 0 6px 10px; text-align: left; border-bottom: 1.5px solid var(--border); text-transform: uppercase; }
  .expense-table td { padding: 10px 6px; font-size: 13px; border-bottom: 1px solid var(--border); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 600; font-family: 'Syne', sans-serif; }
  .badge-yo { background: #fff0eb; color: var(--accent); }
  .badge-amigo { background: #ebf2ff; color: var(--accent2); }

  /* Modales */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; padding: 16px; }
  .modal-overlay.open { display: flex; }
  .modal { background: white; border-radius: 16px; padding: 24px; width: 100%; max-width: 400px; }
  .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
  .modal-btns button { flex: 1; padding: 12px; border-radius: 10px; border: none; font-family: 'Syne', sans-serif; font-weight: 700; cursor: pointer; }

  /* Ahorros UI */
  .ahorro-ui { display: flex; align-items: center; justify-content: space-between; background: #f9f9f9; padding: 15px; border-radius: 12px; border: 1.5px solid var(--border); }
  .btn-mod { width: 34px; height: 34px; border-radius: 8px; border: none; color: white; font-weight: 800; cursor: pointer; }
</style>
</head>
<body>

<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3>Editar gasto</h3>
    <label>Descripción</label><input type="text" id="edit-desc">
    <label>Categoría</label>
    <select id="edit-cat">
      <option value="Hospedaje">🏨 Hospedaje</option>
      <option value="Comida">🍽️ Comida</option>
      <option value="Transporte">🚌 Transporte</option>
      <option value="Otros">📦 Otros</option>
    </select>
    <label>Tipo</label>
    <select id="edit-tipo"><option value="compartido">Compartido</option><option value="individual">Individual</option></select>
    <label>Pagó</label>
    <select id="edit-quien"><option value="yo" id="edit-opt-yo">Yo</option><option value="amigo" id="edit-opt-amigo">Amigo</option></select>
    <div class="modal-btns">
      <button onclick="closeModal()">Cancelar</button>
      <button style="color:#c42a00;" onclick="deleteFromModal()">Borrar</button>
      <button class="btn-save" style="background:var(--accent);color:white;" onclick="saveEdit()">Guardar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="editIngresoModal">
  <div class="modal">
    <h3>Editar ingreso</h3>
    <label>Descripción</label><input type="text" id="ei-desc">
    <label>Monto (R$)</label><input type="number" id="ei-monto" step="0.01">
    <label>Fecha</label><input type="date" id="ei-fecha">
    <div class="modal-btns">
      <button onclick="closeEditIngreso()">Cancelar</button>
      <button style="color:#c42a00;" onclick="deleteIngresoFromModal()">Borrar</button>
      <button style="background:var(--accent);color:white;" onclick="saveEditIngreso()">Guardar</button>
    </div>
  </div>
</div>

<div class="sync-bar">
  <span class="sync-dot" id="sync-dot"></span>
  <span id="sync-msg">Conectando...</span>
</div>

<header>
  <h1>Gastos<br>del Viaje</h1>
  <div style="text-align:right;">
    <div style="font-size:32px;">🇧🇷</div>
    <button onclick="clearData()" style="font-size:10px;background:none;color:white;border:1px solid #444;padding:4px 8px;border-radius:20px;">Borrar todo</button>
  </div>
</header>

<div class="container">

  <div class="card">
    <div class="card-title">⚙️ Configuración</div>
    <div class="name-inputs" style="margin-bottom:15px;">
      <div><label style="font-size:11px;color:var(--muted);">Vos</label><input type="text" id="nameYo" oninput="updateNames()" value="Yo"></div>
      <div><label style="font-size:11px;color:var(--muted);">Amigo/a</label><input type="text" id="nameAmigo" oninput="updateNames()" value="Amigo"></div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;background:var(--bg);padding:12px;border-radius:12px;">
      <span style="font-weight:700;">1 R$ =</span>
      <input type="number" id="tc-manual-val" step="0.01" oninput="applyManualTC()" style="width:100px;padding:8px;border:1.5px solid var(--border);border-radius:8px;font-family:'Syne';font-weight:800;text-align:center;color:var(--ars);">
      <span style="font-size:13px;color:var(--muted);">Pesos Argentinos</span>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📊 Presupuesto Viaje</div>
    <div class="inv-grid">
      <div class="inv-block"><label>Tu aporte (R$)</label><input type="number" id="aporte-yo" oninput="updateInv()"></div>
      <div class="inv-block"><label id="lbl-aporte-amigo">Aporte amigo (R$)</label><input type="number" id="aporte-amigo" oninput="updateInv()"></div>
    </div>
    
    <div style="margin-top:15px; border-top:1px dashed var(--border); padding-top:15px;">
      <label style="font-size:12px;color:var(--muted);">Ingresos extra (Ventas, reembolsos, etc)</label>
      <div id="ingresos-list" style="margin:10px 0;"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:5px;">
        <input type="text" id="ingreso-desc" placeholder="Desc..." style="padding:8px;border-radius:8px;border:1px solid var(--border);">
        <input type="number" id="ingreso-monto" placeholder="R$" style="padding:8px;border-radius:8px;border:1px solid var(--border);">
        <input type="date" id="ingreso-fecha" style="padding:8px;border-radius:8px;border:1px solid var(--border);font-size:11px;">
        <button onclick="addIngreso()" style="padding:0 12px;background:var(--success);color:white;border:none;border-radius:8px;font-weight:800;">+</button>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:20px;text-align:center;">
      <div><div style="font-size:10px;color:var(--muted);">TOTAL</div><div id="inv-total" style="font-weight:800;font-family:'Syne';">R$ 0</div></div>
      <div><div style="font-size:10px;color:var(--muted);">GASTADO</div><div id="inv-gastado" style="font-weight:800;font-family:'Syne';color:var(--accent);">R$ 0</div></div>
      <div><div style="font-size:10px;color:var(--muted);">DISPONIBLE</div><div id="inv-restante" style="font-weight:800;font-family:'Syne';color:var(--success);">R$ 0</div></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📝 Registro de Gastos</div>
    <div class="day-tabs" id="dayTabs" style="display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;margin-bottom:15px;"></div>

    <div style="background:#fcfcfc;border:1px solid #eee;padding:15px;border-radius:14px;">
      <div class="form-row">
        <div><label>Pagó</label><select id="f-quien"><option value="yo" id="opt-yo">Yo</option><option value="amigo" id="opt-amigo">Amigo</option></select></div>
        <div><label>Moneda</label><select id="f-moneda" onchange="onMonedaChange()"><option value="BRL">R$</option><option value="ARS">$ ARS</option></select></div>
        <div><label>Monto</label><input type="number" id="f-monto" step="0.01" oninput="updateConversionPreview()"></div>
        <div><label>Descripción</label><input type="text" id="f-desc" placeholder="Ej: Cena"></div>
      </div>
      <div class="form-row2">
        <div><label>Categoría</label><select id="f-cat"><option value="Comida">🍽️ Comida</option><option value="Transporte">🚌 Transporte</option><option value="Hospedaje">🏨 Hospedaje</option><option value="Otros">📦 Otros</option></select></div>
        <div><label>Tipo</label>
          <div class="tipo-toggle">
            <button class="tipo-btn active-comp" id="btn-comp" onclick="setTipo('compartido')">Compartido</button>
            <button class="tipo-btn" id="btn-indiv" onclick="setTipo('individual')">Solo yo</button>
          </div>
        </div>
      </div>
      <div id="conversion-preview" style="font-size:11px;color:var(--ars);margin-bottom:8px;height:14px;"></div>
      <button class="btn-add" onclick="addExpense()">+ Guardar Gasto</button>
    </div>

    <div style="margin-top:20px;display:flex;justify-content:space-between;align-items:center;">
      <span style="font-size:12px;font-weight:700;">VER EN:</span>
      <div style="display:flex;gap:5px;">
        <button id="btn-brl" onclick="setCurrency('BRL')" style="padding:4px 10px;border-radius:15px;border:1px solid var(--border);font-size:11px;cursor:pointer;">R$</button>
        <button id="btn-ars" onclick="setCurrency('ARS')" style="padding:4px 10px;border-radius:15px;border:1px solid var(--border);font-size:11px;cursor:pointer;">ARS</button>
      </div>
    </div>
    <div id="expense-list" style="margin-top:15px;"></div>
    <div id="day-summary"></div>
  </div>

  <div class="card">
    <div class="card-title">🏁 Liquidación Final</div>
    <div id="liquidacion" style="background:var(--text);color:white;padding:15px;border-radius:12px;text-align:center;font-family:'Syne';font-size:18px;">Calculando...</div>
  </div>

  <div class="card">
    <div class="card-title">💰 Tus Ahorros</div>
    <div class="ahorro-ui">
      <div>
        <div id="ahorro-total" style="font-family:'Syne'; font-size:24px; font-weight:800; color:var(--success);">R$ 0,00</div>
        <div id="ahorro-ars" style="font-size:12px; color:var(--muted);">≈ $ 0 ARS</div>
      </div>
      <div style="display:flex; gap:8px;">
        <input type="number" id="ahorro-mod" placeholder="R$" style="width:80px; text-align:center; border:1px solid var(--border); border-radius:8px;">
        <button class="btn-mod" style="background:var(--accent);" onclick="modAhorro('sub')">−</button>
        <button class="btn-mod" style="background:var(--success);" onclick="modAhorro('add')">+</button>
      </div>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCQ6luJfoXP_1Ov_guQwrgokQA23v_sGy0",
  authDomain: "gastos-brasil.firebaseapp.com",
  projectId: "gastos-brasil",
  storageBucket: "gastos-brasil.firebasestorage.app",
  messagingSenderId: "518639861512",
  appId: "1:518639861512:web:201496d00168cbcef036bd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const docRef = doc(db, "viaje", "datos");

// Estado y Lógica (Recuperada del archivo original para no romper cálculos)
let days = [[]];
let currentDay = 0;
let nameYo = 'Yo';
let nameAmigo = 'Amigo';
let tcARS_BRL = null;
let displayCurrency = 'BRL';
let tipoActual = 'compartido';
let ingresos = [];
let dayDates = [''];
let dayLabels = ['Día 1'];
let ahorros = 0;

const CAT_ICONS = {'Hospedaje':'🏨','Comida':'🍽️','Transporte':'🚌','Otros':'📦'};

function fmt(n) { return n.toLocaleString('es-AR', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function arsToBrl(v) { return tcARS_BRL ? v * tcARS_BRL : 0; }
function brlToArs(v) { return tcARS_BRL ? v / tcARS_BRL : 0; }
function toBRL(m, mon) { return mon === 'BRL' ? m : arsToBrl(m); }

window.applyManualTC = function() {
  const val = parseFloat(document.getElementById('tc-manual-val').value);
  if (!val || val <= 0) { tcARS_BRL = null; return; }
  tcARS_BRL = 1 / val;
  renderAll(); save();
}

window.modAhorro = (op) => {
    const mod = parseFloat(document.getElementById('ahorro-mod').value) || 0;
    if(op === 'add') ahorros += mod;
    else ahorros -= mod;
    document.getElementById('ahorro-mod').value = '';
    renderAll(); save();
};

// Sincronización
async function save() {
    setSyncStatus('loading', 'Guardando...');
    try {
        const daysObj = {};
        days.forEach((d, i) => { daysObj['day_' + i] = d; });
        await setDoc(docRef, {
            daysObj, daysCount: days.length, currentDay, nameYo, nameAmigo, displayCurrency,
            tcARS_BRL: tcARS_BRL || null, ingresos, dayDates, dayLabels, ahorros,
            aporteYo: document.getElementById('aporte-yo').value || '',
            aporteAmigo: document.getElementById('aporte-amigo').value || ''
        });
        setSyncStatus('ok', '✓');
    } catch(e) { setSyncStatus('err', 'Error'); }
}

onSnapshot(docRef, (snap) => {
    if (snap.exists()) {
        const data = snap.data();
        days = [];
        for (let i = 0; i < (data.daysCount || 1); i++) { days.push(data.daysObj['day_' + i] || []); }
        nameYo = data.nameYo || 'Yo';
        nameAmigo = data.nameAmigo || 'Amigo';
        tcARS_BRL = data.tcARS_BRL || null;
        ingresos = data.ingresos || [];
        ahorros = data.ahorros || 0;
        dayDates = data.dayDates || days.map(() => '');
        dayLabels = data.dayLabels || days.map((_, i) => `Día ${i + 1}`);
        document.getElementById('nameYo').value = nameYo;
        document.getElementById('nameAmigo').value = nameAmigo;
        document.getElementById('aporte-yo').value = data.aporteYo || '';
        document.getElementById('aporte-amigo').value = data.aporteAmigo || '';
        if (tcARS_BRL) document.getElementById('tc-manual-val').value = (1 / tcARS_BRL).toFixed(2);
        renderAll();
        setSyncStatus('ok', '✓');
    }
});

function setSyncStatus(state, msg) {
  document.getElementById('sync-dot').className = 'sync-dot ' + state;
  document.getElementById('sync-msg').textContent = msg;
}

// Renderizado (Sigue la lógica exacta de tu archivo original)
function renderAll() {
    // Nombres
    document.getElementById('opt-yo').textContent = nameYo;
    document.getElementById('opt-amigo').textContent = nameAmigo;
    document.getElementById('lbl-aporte-amigo').textContent = `Aporte ${nameAmigo} (R$)`;

    // Tabs
    let tabHtml = days.map((_, i) => `
        <button class="day-tab ${i===currentDay?'active':''}" onclick="selectDay(${i})" style="padding:6px 12px;border-radius:15px;border:1px solid var(--border);background:${i===currentDay?'var(--text)':'white'};color:${i===currentDay?'white':'var(--muted)'};cursor:pointer;font-size:11px;font-weight:700;">
            ${dayLabels[i] || 'Día '+(i+1)}
        </button>
    `).join('');
    tabHtml += `<button onclick="addDay()" style="padding:6px 12px;border-radius:15px;border:1px dashed var(--accent);background:none;color:var(--accent);font-size:11px;cursor:pointer;">+ Día</button>`;
    document.getElementById('dayTabs').innerHTML = tabHtml;

    // Gastos Table
    const list = document.getElementById('expense-list');
    const expenses = days[currentDay] || [];
    let html = `<table class="expense-table"><thead><tr><th>Qué</th><th>Pagó</th><th style="text-align:right">Monto</th><th></th></tr></thead><tbody>`;
    expenses.forEach(e => {
        const displayAmt = displayCurrency === 'BRL' ? `R$ ${fmt(toBRL(e.monto, e.moneda))}` : `$ ${fmt(toBRL(e.monto, e.moneda) / (tcARS_BRL || 1))}`;
        html += `<tr>
            <td><div style="font-weight:700;">${e.desc}</div><div style="font-size:9px;color:var(--muted);">${CAT_ICONS[e.cat]} ${e.cat} • ${e.tipo}</div></td>
            <td><span class="badge ${e.quien==='yo'?'badge-yo':'badge-amigo'}">${e.quien==='yo'?nameYo:nameAmigo}</span></td>
            <td style="text-align:right;font-weight:800;">${displayAmt}</td>
            <td style="text-align:right;"><button style="background:none;border:none;cursor:pointer;" onclick="openEdit(${e.id})">✏️</button></td>
        </tr>`;
    });
    list.innerHTML = html + '</tbody></table>';

    // Inversión y Totales
    const yoA = parseFloat(document.getElementById('aporte-yo').value) || 0;
    const amA = parseFloat(document.getElementById('aporte-amigo').value) || 0;
    const extra = ingresos.reduce((s, i) => s + i.monto, 0);
    const totalInv = yoA + amA + extra;
    const gastadoTotal = days.flat().reduce((s, e) => s + toBRL(e.monto, e.moneda), 0);
    
    document.getElementById('inv-total').textContent = `R$ ${fmt(totalInv)}`;
    document.getElementById('inv-gastado').textContent = `R$ ${fmt(gastadoTotal)}`;
    document.getElementById('inv-restante').textContent = `R$ ${fmt(totalInv - gastadoTotal)}`;

    // Ingresos List (Mini listado editable)
    document.getElementById('ingresos-list').innerHTML = ingresos.map(i => `
        <div style="display:flex;justify-content:space-between;font-size:11px;background:#fcfcfc;padding:5px;border:1px solid #eee;border-radius:6px;margin-bottom:3px;">
            <span>${i.fecha ? i.fecha.split('-').reverse().slice(0,2).join('/') : ''} <b>${i.desc}</b></span>
            <span>R$ ${fmt(i.monto)} <button style="background:none;border:none;cursor:pointer;margin-left:5px;" onclick="openEditIngreso(${i.id})">✏️</button></span>
        </div>
    `).join('');

    // Liquidación
    const comp = days.flat().filter(e => e.tipo === 'compartido');
    const totComp = comp.reduce((s, e) => s + toBRL(e.monto, e.moneda), 0);
    const pagueYo = comp.filter(e => e.quien === 'yo').reduce((s, e) => s + toBRL(e.monto, e.moneda), 0);
    const diff = pagueYo - (totComp / 2);
    const liqEl = document.getElementById('liquidacion');
    if(Math.abs(diff) < 0.1) liqEl.textContent = "¡Están a mano!";
    else if(diff > 0) liqEl.innerHTML = `${nameAmigo} debe a ${nameYo}: <br><span style="color:#4cff91">R$ ${fmt(diff)}</span>`;
    else liqEl.innerHTML = `${nameYo} debe a ${nameAmigo}: <br><span style="color:#4cff91">R$ ${fmt(Math.abs(diff))}</span>`;

    // Ahorros
    document.getElementById('ahorro-total').textContent = `R$ ${fmt(ahorros)}`;
    document.getElementById('ahorro-ars').textContent = `≈ $ ${fmt(brlToArs(ahorros))} ARS`;
}

// Funciones de Acción (Recuperadas de tu archivo original)
window.updateNames = function() { nameYo = document.getElementById('nameYo').value; nameAmigo = document.getElementById('nameAmigo').value; renderAll(); save(); };
window.setTipo = function(t) { tipoActual = t; document.getElementById('btn-comp').className = 'tipo-btn' + (t==='compartido'?' active-comp':''); document.getElementById('btn-indiv').className = 'tipo-btn' + (t==='individual'?' active-indiv':''); };
window.setCurrency = function(c) { displayCurrency = c; renderAll(); };
window.selectDay = (i) => { currentDay = i; renderAll(); };
window.addDay = () => { days.push([]); dayDates.push(''); dayLabels.push('Día ' + days.length); currentDay = days.length - 1; renderAll(); save(); };

window.addExpense = function() {
    const monto = parseFloat(document.getElementById('f-monto').value);
    const desc = document.getElementById('f-desc').value;
    if(!monto || !desc) return;
    days[currentDay].push({ id: Date.now(), quien: document.getElementById('f-quien').value, moneda: document.getElementById('f-moneda').value, monto, desc, cat: document.getElementById('f-cat').value, tipo: tipoActual });
    document.getElementById('f-monto').value = ''; document.getElementById('f-desc').value = '';
    renderAll(); save();
};

window.addIngreso = function() {
  const desc = document.getElementById('ingreso-desc').value;
  const monto = parseFloat(document.getElementById('ingreso-monto').value);
  const fecha = document.getElementById('ingreso-fecha').value;
  if (!monto || !desc) return;
  ingresos.push({ desc, monto, fecha, id: Date.now() });
  document.getElementById('ingreso-desc').value = ''; document.getElementById('ingreso-monto').value = '';
  renderAll(); save();
};

// Edición (Modales)
let editingId = null;
window.openEdit = (id) => {
    editingId = id;
    const e = days.flat().find(x => x.id === id);
    document.getElementById('edit-desc').value = e.desc;
    document.getElementById('edit-cat').value = e.cat;
    document.getElementById('edit-tipo').value = e.tipo;
    document.getElementById('edit-quien').value = e.quien;
    document.getElementById('editModal').classList.add('open');
};
window.closeModal = () => document.getElementById('editModal').classList.remove('open');
window.saveEdit = () => {
    for (let d of days) {
        const e = d.find(x => x.id === editingId);
        if (e) {
            e.desc = document.getElementById('edit-desc').value;
            e.cat = document.getElementById('edit-cat').value;
            e.tipo = document.getElementById('edit-tipo').value;
            e.quien = document.getElementById('edit-quien').value;
        }
    }
    closeModal(); renderAll(); save();
};
window.deleteFromModal = () => {
    if(!confirm("¿Borrar?")) return;
    for (let i=0; i<days.length; i++) days[i] = days[i].filter(x => x.id !== editingId);
    closeModal(); renderAll(); save();
};

// Edición Ingresos
let editingIngresoId = null;
window.openEditIngreso = (id) => {
    editingIngresoId = id;
    const i = ingresos.find(x => x.id === id);
    document.getElementById('ei-desc').value = i.desc;
    document.getElementById('ei-monto').value = i.monto;
    document.getElementById('ei-fecha').value = i.fecha || '';
    document.getElementById('editIngresoModal').classList.add('open');
};
window.closeEditIngreso = () => document.getElementById('editIngresoModal').classList.remove('open');
window.saveEditIngreso = () => {
    const i = ingresos.find(x => x.id === editingIngresoId);
    i.desc = document.getElementById('ei-desc').value;
    i.monto = parseFloat(document.getElementById('ei-monto').value);
    i.fecha = document.getElementById('ei-fecha').value;
    closeEditIngreso(); renderAll(); save();
};
window.deleteIngresoFromModal = () => {
    ingresos = ingresos.filter(x => x.id !== editingIngresoId);
    closeEditIngreso(); renderAll(); save();
};

window.clearData = () => { if(confirm("¿BORRAR TODO?")) { setDoc(docRef, {}); location.reload(); } };
window.updateConversionPreview = () => {
    const m = parseFloat(document.getElementById('f-monto').value);
    const mon = document.getElementById('f-moneda').value;
    const p = document.getElementById('conversion-preview');
    if(!m || !tcARS_BRL) { p.textContent = ''; return; }
    p.textContent = mon === 'BRL' ? `≈ $ ${fmt(brlToArs(m))} ARS` : `≈ R$ ${fmt(arsToBrl(m))} Reales`;
};
window.onMonedaChange = () => { updateConversionPreview(); };

</script>
</body>
</html>
