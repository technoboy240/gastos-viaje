<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gastos del Viaje 🇧🇷</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f4ee; --card: #ffffff; --accent: #e8521a; --accent2: #1a7ae8;
    --text: #1a1a1a; --muted: #888; --border: #e0dbd0; --success: #1a7a3a; --ars: #6b3fa0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 0 0 60px; }
  
  /* Layout */
  header { background: var(--text); color: white; padding: 28px 24px 20px; display: flex; align-items: flex-end; justify-content: space-between; }
  header h1 { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; line-height: 1.1; }
  .container { max-width: 680px; margin: 0 auto; padding: 20px 16px; }
  .card { background: var(--card); border-radius: 16px; border: 1.5px solid var(--border); padding: 20px; margin-bottom: 20px; }
  .card-title { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted); margin-bottom: 16px; border-bottom: 1px solid #eee; padding-bottom: 8px; }

  /* Sync Bar */
  .sync-bar { display: flex; align-items: center; gap: 8px; padding: 8px 16px; background: #111; color: white; font-size: 11px; font-family: 'Syne', sans-serif; }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: #555; }
  .sync-dot.ok { background: #4cff91; }
  .sync-dot.loading { background: #ffc84c; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* Forms & Inputs */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .input-group { margin-bottom: 12px; }
  label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 4px; font-weight: 600; }
  input, select { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 10px; font-family: inherit; font-size: 14px; outline: none; }
  input:focus { border-color: var(--accent2); }

  /* Seccion Presupuesto */
  .stats-header { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 15px; }
  .stat-item { text-align: center; background: #fcfcfc; padding: 10px; border-radius: 12px; border: 1px solid #f0f0f0; }
  .stat-val { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800; }

  /* Ahorros Control */
  .ahorro-ui { display: flex; align-items: center; justify-content: space-between; background: #f9f9f9; padding: 15px; border-radius: 12px; }
  .btn-mod { width: 34px; height: 34px; border-radius: 8px; border: none; color: white; font-weight: 800; cursor: pointer; }
  .btn-mod.plus { background: var(--success); }
  .btn-mod.minus { background: var(--accent); }

  /* Table Style */
  table { width: 100%; border-collapse: collapse; margin-top: 10px; }
  th { text-align: left; font-size: 10px; color: var(--muted); padding: 8px 4px; text-transform: uppercase; border-bottom: 1px solid var(--border); }
  td { padding: 12px 4px; font-size: 13px; border-bottom: 1px solid #f5f5f5; }
  .btn-edit { background: none; border: none; cursor: pointer; font-size: 14px; padding: 4px; opacity: 0.6; }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; }
  .modal { background: white; width: 90%; max-width: 400px; padding: 24px; border-radius: 20px; }
  
  .tipo-toggle { display: flex; border: 1.5px solid var(--border); border-radius: 10px; overflow: hidden; }
  .tipo-btn { flex: 1; padding: 8px; border: none; background: #f5f5f5; cursor: pointer; font-size: 12px; font-weight: 600; }
  .tipo-btn.active { background: var(--text); color: white; }

  @media (max-width: 480px) {
    .stats-header { grid-template-columns: 1fr; }
    .grid-2 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="sync-bar">
  <span class="sync-dot" id="sync-dot"></span>
  <span id="sync-msg">Iniciando...</span>
</div>

<header>
  <h1>Gastos<br>Brasil 🇧🇷</h1>
  <button onclick="confirmReset()" style="font-size:10px; opacity:0.5; background:none; color:white; border:1px solid white; padding:4px 8px; border-radius:4px;">Reiniciar Todo</button>
</header>

<div class="container">

  <div class="card">
    <div class="card-title">⚙️ Configuración</div>
    <div class="grid-2">
      <div class="input-group">
        <label id="label-yo">Nombre Miembro 1</label>
        <input type="text" id="nameYo" placeholder="Yo" oninput="updateNames()">
      </div>
      <div class="input-group">
        <label id="label-amigo">Nombre Miembro 2</label>
        <input type="text" id="nameAmigo" placeholder="Amigo" oninput="updateNames()">
      </div>
    </div>
    <div style="margin-top:10px; display:flex; align-items:center; gap:12px; background:var(--bg); padding:12px; border-radius:12px;">
      <span style="font-weight:800; font-family:'Syne';">1 R$ =</span>
      <input type="number" id="tc-input" step="0.01" oninput="changeTC()" style="width:100px; font-weight:800; color:var(--ars); text-align:center;">
      <span style="font-size:12px; color:var(--muted); font-weight:600;">Pesos Argentinos</span>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📊 Presupuesto Viaje</div>
    <div class="stats-header">
      <div class="stat-item"><div class="stat-val" id="inv-total">R$ 0</div><label>Presupuesto</label></div>
      <div class="stat-item"><div class="stat-val" id="inv-gastado" style="color:var(--accent);">R$ 0</div><label>Gastado</label></div>
      <div class="stat-item"><div class="stat-val" id="inv-restante" style="color:var(--success);">R$ 0</div><label>Disponible</label></div>
    </div>

    <div class="grid-2">
      <div class="input-group"><label>Aporte Inicial (Yo)</label><input type="number" id="aporte-yo" oninput="save()"></div>
      <div class="input-group"><label>Aporte Inicial (Amigo)</label><input type="number" id="aporte-amigo" oninput="save()"></div>
    </div>

    <div style="margin-top:15px; border-top:1px dashed var(--border); padding-top:15px;">
      <label>Ingresos Extras (Venta de reales, devoluciones, etc.)</label>
      <div id="ingresos-list" style="margin-bottom:10px;"></div>
      <div style="display:grid; grid-template-columns: 100px 1fr 80px auto; gap:6px;">
        <input type="date" id="ing-date" style="padding:6px; font-size:11px;">
        <input type="text" id="ing-desc" placeholder="Motivo..." style="padding:6px;">
        <input type="number" id="ing-monto" placeholder="R$" style="padding:6px;">
        <button onclick="addIngreso()" style="padding:0 12px; background:var(--success); color:white; border:none; border-radius:8px; font-weight:800;">+</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📝 Registro de Gastos</div>
    
    <div id="dayTabs" style="display:flex; gap:6px; overflow-x:auto; margin-bottom:15px; padding-bottom:5px;"></div>

    <div style="background:#fcfcfc; border:1px solid #eee; padding:15px; border-radius:14px; margin-bottom:20px;">
        <div class="grid-2" style="margin-bottom:10px;">
            <div><label>Pagó</label><select id="f-quien"><option value="yo" id="opt-yo">Yo</option><option value="amigo" id="opt-amigo">Amigo</option></select></div>
            <div><label>Moneda</label><select id="f-mon" onchange="updatePreview()"><option value="BRL">Reales (R$)</option><option value="ARS">Pesos ($)</option></select></div>
        </div>
        <div class="grid-2" style="margin-bottom:10px;">
            <div><label>Monto</label><input type="number" id="f-monto" step="0.01" oninput="updatePreview()"></div>
            <div><label>Descripción</label><input type="text" id="f-desc" placeholder="Ej: Cena"></div>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
            <div class="tipo-toggle" style="width:180px;">
                <button class="tipo-btn active" id="t-comp" onclick="setTipo('compartido')">Compartido</button>
                <button class="tipo-btn" id="t-indiv" onclick="setTipo('individual')">Solo yo</button>
            </div>
            <div id="f-preview" style="font-size:11px; font-weight:700; color:var(--ars);"></div>
        </div>
        <button onclick="addGasto()" style="width:100%; padding:12px; background:var(--accent2); color:white; border:none; border-radius:10px; font-weight:700; cursor:pointer;">+ Guardar Gasto</button>
    </div>

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <label>Listado de hoy:</label>
        <select id="view-mon" onchange="renderAll()" style="width:auto; padding:4px; font-size:11px;">
            <option value="BRL">Ver en R$</option>
            <option value="ARS">Ver en ARS</option>
        </select>
    </div>
    <div id="lista-gastos"></div>
  </div>

  <div class="card">
    <div class="card-title">🏁 Liquidación Final</div>
    <div id="liquidacion-box" style="text-align:center; padding:10px; background:var(--text); color:white; border-radius:12px;">
        <div style="font-size:11px; opacity:0.7; margin-bottom:4px;">SALDO ENTRE AMIGOS</div>
        <div id="liq-res" style="font-family:'Syne'; font-size:18px; font-weight:800;">Calculando...</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">💰 Tus Ahorros</div>
    <div class="ahorro-ui">
      <div>
        <div id="ahorro-total" style="font-family:'Syne'; font-size:24px; font-weight:800; color:var(--success);">R$ 0,00</div>
        <div id="ahorro-ars" style="font-size:12px; color:var(--muted);">≈ $ 0 ARS</div>
      </div>
      <div style="display:flex; gap:8px;">
        <input type="number" id="ahorro-mod" placeholder="Monto" style="width:80px; text-align:center;">
        <button class="btn-mod minus" onclick="modAhorro('sub')">−</button>
        <button class="btn-mod plus" onclick="modAhorro('add')">+</button>
      </div>
    </div>
  </div>

</div>

<div class="modal-overlay" id="editModal">
    <div class="modal">
        <div class="card-title">Editar Ítem</div>
        <div class="input-group"><label>Descripción</label><input type="text" id="e-desc"></div>
        <div class="grid-2">
            <div class="input-group"><label>Monto</label><input type="number" id="e-monto"></div>
            <div class="input-group"><label>Moneda</label><select id="e-mon"><option value="BRL">R$</option><option value="ARS">ARS</option></select></div>
        </div>
        <div class="input-group"><label>Mover al Día</label><select id="e-dia"></select></div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button onclick="closeModal()" style="flex:1; padding:10px; border:1px solid var(--border); border-radius:10px; background:none;">Cerrar</button>
            <button onclick="saveEdit()" style="flex:1; padding:10px; background:var(--accent2); color:white; border:none; border-radius:10px; font-weight:700;">Guardar</button>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCQ6luJfoXP_1Ov_guQwrgokQA23v_sGy0",
  authDomain: "gastos-brasil.firebaseapp.com",
  projectId: "gastos-brasil",
  storageBucket: "gastos-brasil.firebasestorage.app",
  messagingSenderId: "518639861512",
  appId: "1:518639861512:web:201496d00168cbcef036bd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const docRef = doc(db, "viaje", "datos");

// Estado Global
let days = [[]];
let currentDay = 0;
let nameYo = "Yo";
let nameAmigo = "Amigo";
let tc = 290; 
let ahorros = 0;
let ingresos = [];
let tipoGasto = 'compartido';
let editTarget = null; // {type: 'gasto'|'ingreso', day: idx, id: id}

// Utils
const fmt = (n) => n.toLocaleString('es-AR', {minimumFractionDigits:2, maximumFractionDigits:2});
const toBRL = (m, mon) => mon === 'BRL' ? m : m / tc;
const toARS = (m, mon) => mon === 'ARS' ? m : m * tc;

function setSync(state, msg) {
    document.getElementById('sync-dot').className = 'sync-dot ' + state;
    document.getElementById('sync-msg').textContent = msg;
}

async function save() {
    setSync('loading', 'Guardando...');
    try {
        const daysObj = {};
        days.forEach((d, i) => daysObj['day_'+i] = d);
        await setDoc(docRef, {
            daysObj, daysCount: days.length,
            nameYo, nameAmigo, tc, ahorros, ingresos,
            aporteYo: document.getElementById('aporte-yo').value || 0,
            aporteAmigo: document.getElementById('aporte-amigo').value || 0
        });
        setSync('ok', 'Sincronizado');
    } catch (e) { setSync('err', 'Error de red'); }
}

onSnapshot(docRef, (snap) => {
    if (snap.exists()) {
        const d = snap.data();
        days = [];
        for(let i=0; i<(d.daysCount||1); i++) days.push(d.daysObj['day_'+i] || []);
        nameYo = d.nameYo || "Yo";
        nameAmigo = d.nameAmigo || "Amigo";
        tc = d.tc || 290;
        ahorros = d.ahorros || 0;
        ingresos = d.ingresos || [];
        document.getElementById('aporte-yo').value = d.aporteYo || '';
        document.getElementById('aporte-amigo').value = d.aporteAmigo || '';
        document.getElementById('tc-input').value = tc;
        renderAll();
        setSync('ok', 'Sincronizado');
    }
});

// Funciones UI
window.updateNames = () => {
    nameYo = document.getElementById('nameYo').value || "Yo";
    nameAmigo = document.getElementById('nameAmigo').value || "Amigo";
    renderAll();
    save();
};

window.changeTC = () => {
    tc = parseFloat(document.getElementById('tc-input').value) || 1;
    renderAll();
    save();
};

window.setTipo = (t) => {
    tipoGasto = t;
    document.getElementById('t-comp').className = 'tipo-btn ' + (t==='compartido'?'active':'');
    document.getElementById('t-indiv').className = 'tipo-btn ' + (t==='individual'?'active':'');
};

window.addGasto = () => {
    const desc = document.getElementById('f-desc').value;
    const monto = parseFloat(document.getElementById('f-monto').value);
    const mon = document.getElementById('f-mon').value;
    const quien = document.getElementById('f-quien').value;
    if(!desc || !monto) return;

    days[currentDay].push({ id: Date.now(), desc, monto, mon, quien, tipo: tipoGasto });
    document.getElementById('f-desc').value = '';
    document.getElementById('f-monto').value = '';
    renderAll();
    save();
};

window.addIngreso = () => {
    const date = document.getElementById('ing-date').value;
    const desc = document.getElementById('ing-desc').value;
    const monto = parseFloat(document.getElementById('ing-monto').value);
    if(!desc || !monto) return;
    ingresos.push({ id: Date.now(), date, desc, monto });
    document.getElementById('ing-desc').value = '';
    document.getElementById('ing-monto').value = '';
    renderAll();
    save();
};

window.modAhorro = (op) => {
    const mod = parseFloat(document.getElementById('ahorro-mod').value) || 0;
    const mon = document.getElementById('view-mon').value;
    let modBRL = (mon === 'BRL') ? mod : mod / tc;
    
    if(op === 'add') ahorros += modBRL;
    else ahorros -= modBRL;
    document.getElementById('ahorro-mod').value = '';
    renderAll();
    save();
};

window.updatePreview = () => {
    const m = parseFloat(document.getElementById('f-monto').value);
    const mon = document.getElementById('f-mon').value;
    const prev = document.getElementById('f-preview');
    if(!m) { prev.textContent = ''; return; }
    prev.textContent = mon === 'BRL' ? `≈ $ ${fmt(m * tc)}` : `≈ R$ ${fmt(m / tc)}`;
};

// Renderizado
function renderAll() {
    // Nombres
    document.getElementById('label-yo').textContent = `Nombre ${nameYo}`;
    document.getElementById('label-amigo').textContent = `Nombre ${nameAmigo}`;
    document.getElementById('opt-yo').textContent = nameYo;
    document.getElementById('opt-amigo').textContent = nameAmigo;

    const viewMon = document.getElementById('view-mon').value;
    const symbol = viewMon === 'BRL' ? 'R$' : '$';

    // Tabs
    const tabs = document.getElementById('dayTabs');
    tabs.innerHTML = days.map((_, i) => `
        <button class="tipo-btn ${i===currentDay?'active':''}" onclick="setDay(${i})" style="border-radius:20px; padding:6px 15px;">Día ${i+1}</button>
    `).join('') + `<button onclick="addDay()" style="border-radius:20px; padding:6px 15px; border:1px dashed var(--muted); background:none; cursor:pointer;">+ Día</button>`;

    // Gastos
    const list = document.getElementById('lista-gastos');
    let html = `<table><thead><tr><th>Qué</th><th>Monto</th><th></th></tr></thead><tbody>`;
    days[currentDay].forEach(g => {
        const val = viewMon === 'BRL' ? toBRL(g.monto, g.mon) : toARS(g.monto, g.mon);
        html += `<tr>
            <td>
                <div style="font-weight:700;">${g.desc}</div>
                <div style="font-size:10px; color:${g.quien==='yo'?'var(--accent)':'var(--accent2)'}">${g.quien==='yo'?nameYo:nameAmigo} • ${g.tipo}</div>
            </td>
            <td style="font-weight:800;">${symbol} ${fmt(val)}</td>
            <td style="text-align:right;">
                <button class="btn-edit" onclick="openEdit('gasto', ${currentDay}, ${g.id})">✏️</button>
                <button class="btn-edit" onclick="deleteItem('gasto', ${currentDay}, ${g.id})" style="opacity:0.3;">🗑️</button>
            </td>
        </tr>`;
    });
    list.innerHTML = html + `</tbody></table>`;

    // Presupuesto
    const a1 = parseFloat(document.getElementById('aporte-yo').value) || 0;
    const a2 = parseFloat(document.getElementById('aporte-amigo').value) || 0;
    const extra = ingresos.reduce((s, i) => s + i.monto, 0);
    const totalPresupuesto = a1 + a2 + extra;
    const gastadoTotal = days.flat().reduce((s, g) => s + toBRL(g.monto, g.mon), 0);

    document.getElementById('inv-total').textContent = `R$ ${fmt(totalPresupuesto)}`;
    document.getElementById('inv-gastado').textContent = `R$ ${fmt(gastadoTotal)}`;
    document.getElementById('inv-restante').textContent = `R$ ${fmt(totalPresupuesto - gastadoTotal)}`;

    // Ingresos List
    document.getElementById('ingresos-list').innerHTML = ingresos.map(i => `
        <div style="display:flex; justify-content:space-between; align-items:center; font-size:12px; background:#fff; padding:6px; border-radius:6px; margin-bottom:4px; border:1px solid #eee;">
            <span><small>${i.date||''}</small> <strong>${i.desc}</strong></span>
            <span>
                <b style="color:var(--success);">R$ ${fmt(i.monto)}</b>
                <button class="btn-edit" onclick="openEdit('ingreso', null, ${i.id})">✏️</button>
            </span>
        </div>
    `).join('');

    // Liquidacion
    const comp = days.flat().filter(g => g.tipo === 'compartido');
    const totComp = comp.reduce((s, g) => s + toBRL(g.monto, g.mon), 0);
    const pagueYo = comp.filter(g => g.quien === 'yo').reduce((s, g) => s + toBRL(g.monto, g.mon), 0);
    const deuda = pagueYo - (totComp / 2);
    
    const liqEl = document.getElementById('liq-res');
    if(Math.abs(deuda) < 0.1) liqEl.textContent = "¡Están a mano!";
    else if(deuda > 0) liqEl.innerHTML = `${nameAmigo} le debe a ${nameYo}: <br><span style="color:#4cff91">R$ ${fmt(deuda)}</span>`;
    else liqEl.innerHTML = `${nameYo} le debe a ${nameAmigo}: <br><span style="color:#4cff91">R$ ${fmt(Math.abs(deuda))}</span>`;

    // Ahorros
    document.getElementById('ahorro-total').textContent = `R$ ${fmt(ahorros)}`;
    document.getElementById('ahorro-ars').textContent = `≈ $ ${fmt(ahorros * tc)} ARS`;
}

// Lógica de Edición Mejorada
window.openEdit = (type, day, id) => {
    editTarget = {type, day, id};
    const item = type === 'gasto' ? days[day].find(g => g.id === id) : ingresos.find(i => i.id === id);
    
    document.getElementById('e-desc').value = item.desc;
    document.getElementById('e-monto').value = item.monto;
    document.getElementById('e-mon').value = item.mon || 'BRL';
    
    const diaSel = document.getElementById('e-dia');
    diaSel.innerHTML = days.map((_, i) => `<option value="${i}">Día ${i+1}</option>`).join('');
    diaSel.value = day;
    diaSel.disabled = (type === 'ingreso');

    document.getElementById('editModal').style.display = 'flex';
};

window.closeModal = () => document.getElementById('editModal').style.display = 'none';

window.saveEdit = () => {
    const desc = document.getElementById('e-desc').value;
    const monto = parseFloat(document.getElementById('e-monto').value);
    const mon = document.getElementById('e-mon').value;
    const newDay = parseInt(document.getElementById('e-dia').value);

    if(editTarget.type === 'gasto') {
        const idx = days[editTarget.day].findIndex(g => g.id === editTarget.id);
        const item = days[editTarget.day].splice(idx, 1)[0];
        item.desc = desc; item.monto = monto; item.mon = mon;
        days[newDay].push(item);
    } else {
        const item = ingresos.find(i => i.id === editTarget.id);
        item.desc = desc; item.monto = monto;
    }
    closeModal();
    renderAll();
    save();
};

window.deleteItem = (type, day, id) => {
    if(!confirm("¿Borrar?")) return;
    if(type === 'gasto') {
        days[day] = days[day].filter(g => g.id !== id);
    } else {
        ingresos = ingresos.filter(i => i.id !== id);
    }
    renderAll();
    save();
};

window.setDay = (i) => { currentDay = i; renderAll(); };
window.addDay = () => { days.push([]); currentDay = days.length - 1; renderAll(); save(); };

window.confirmReset = () => {
    if(confirm("Se borrarán todos los gastos y configuración. ¿Estás seguro?")) {
        days = [[]]; currentDay = 0; ahorros = 0; ingresos = [];
        renderAll();
        save();
    }
};

</script>
</body>
</html>
